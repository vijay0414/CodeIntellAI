services:
  - type: web
    name: codedoctor-backend
    env: python
    region: Singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://code-intell-ai-git-main-vijaykumarasamyvkps-7848s-projects.vercel.app
      - key: LLM_PROVIDER
        value: groq
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
